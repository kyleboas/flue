name: PR Redirect

# SECURITY: This workflow must not use the privileged PR-target trigger.
# It runs only from the default branch on a schedule or explicit manual
# dispatch, so secrets are never exposed to fork-controlled PR workflows.
# The checkout below is the default branch only; do not checkout PR heads or
# run code from PR branches in this workflow.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional PR number to process'
        required: false
        type: string

concurrency:
  group: pr-redirect
  cancel-in-progress: false

jobs:
  redirect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      pull-requests: write
      issues: write
      discussions: write

    steps:
      - name: Checkout default branch only
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build Flue runtime + CLI
        run: pnpm --filter @flue/runtime --filter @flue/cli build

      - name: Ensure processed label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create pr-redirect-processed \
            --description "PR redirect agent has processed this PR" \
            --color 6a737d \
            || true

      - name: Run pr-redirect agent for queued PRs
        env:
          # Read-only token for the agent's in-sandbox `gh` calls.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Privileged write token (astrobot-houston PAT) for the
          # deterministic phase. Must not be exposed to the sandbox.
          FREDKBOT_GITHUB_TOKEN: ${{ secrets.FREDKBOT_GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.CI_ANTHROPIC_API_KEY }}
          REQUESTED_PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${REQUESTED_PR_NUMBER:-}" ]; then
            pr_numbers="$REQUESTED_PR_NUMBER"
          else
            pr_numbers="$(gh pr list --state open --limit 100 \
              --json number,authorAssociation,labels \
              --jq '.[] | select((.authorAssociation != "OWNER" and .authorAssociation != "MEMBER") and ((([.labels[].name] | index("pr-redirect-processed")) | not) or (([.labels[].name] | index("triage")) != null))) | .number')"
          fi

          if [ -z "$pr_numbers" ]; then
            echo "No PRs queued for redirect."
            exit 0
          fi

          for PR_NUMBER in $pr_numbers; do
            echo "Processing PR #$PR_NUMBER"
            node packages/cli/bin/flue.mjs run pr-redirect \
              --target node \
              --id "pr-redirect-$PR_NUMBER" \
              --payload "{\"prNumber\": $PR_NUMBER}"

            gh pr edit "$PR_NUMBER" --add-label pr-redirect-processed || true
            gh pr edit "$PR_NUMBER" --remove-label triage || true
          done
